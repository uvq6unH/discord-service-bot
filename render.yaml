# render.yaml — 2 service riêng biệt
#
# Render Starter plan: $7/tháng mỗi service
# Free plan: chỉ 1 web service — dùng PM2 trên 1 VPS thay thế (xem pm2.config.cjs)

services:
  # ── Bot process (Worker — không expose HTTP) ──────────────────────────────
  - type: worker
    name: discord-bot
    runtime: node
    plan: starter
    buildCommand: pnpm install --no-frozen-lockfile
    startCommand: node src/index.bot.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONFIG_PATH
        value: /var/data/configs.json
      - key: STATE_PATH
        value: /var/data/state.json
      - key: DAILY_RESET_UTC_OFFSET_MINUTES
        value: 420
      - key: COMMAND_COOLDOWN_MS
        value: 3000
      - key: RIOT_COMMAND_COOLDOWN_MS
        value: 15000
      - key: GAME_COMMAND_COOLDOWN_MS
        value: 5000
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: RIOT_API_KEY
        sync: false
      - key: TFT_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: KEEPALIVE_CHANNEL_ID
        sync: false
      - key: LAVALINK_HOST
        sync: false
      - key: LAVALINK_PORT
        value: "2333"
      - key: LAVALINK_PASSWORD
        sync: false
      - key: LAVALINK_SECURE
        value: "false"
    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1

  # ── Dashboard process (Web — expose HTTP, health check) ───────────────────
  - type: web
    name: discord-dashboard
    runtime: node
    plan: starter
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build:ui
    startCommand: node src/index.server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CONFIG_PATH
        value: /var/data/configs.json
      - key: STATE_PATH
        value: /var/data/state.json
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
    disk:
      name: dashboard-data
      mountPath: /var/data
      sizeGB: 1

  # ── Lavalink server (Docker) ───────────────────────────────────────────────
  - type: web
    name: lavalink
    runtime: docker
    plan: free
    dockerfilePath: ./lavalink/Dockerfile
    dockerContext: ./lavalink
    healthCheckPath: /version
    envVars:
      - key: LAVALINK_PASSWORD
        sync: false
