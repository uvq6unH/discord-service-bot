# render.yaml — Canonical deployment config (Split Mode)
#
# 3 services:
#   discord-bot       Web service — Discord client + HTTP health endpoint
#   discord-dashboard Web service — Express dashboard + React SPA
#   lavalink          Docker      — Audio server (optional, for music commands)
#
# Cả hai service dùng cùng một Upstash Redis instance.
# Không dùng disk persistent — mọi state đi qua Redis.
# Không set CONFIG_PATH hay STATE_PATH — stateStore tự dùng Redis khi NODE_ENV=production.

services:
  # ── Bot (Web — binds HTTP port trước khi login, bắt buộc để Render detect) ──
  - type: web
    name: discord-bot
    runtime: node
    plan: starter
    buildCommand: pnpm install --no-lockfile --include=dev
    startCommand: node src/index.bot.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DAILY_RESET_UTC_OFFSET_MINUTES
        value: "420"
      - key: COMMAND_COOLDOWN_MS
        value: "3000"
      - key: RIOT_COMMAND_COOLDOWN_MS
        value: "15000"
      - key: GAME_COMMAND_COOLDOWN_MS
        value: "5000"
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: RIOT_API_KEY
        sync: false
      - key: TFT_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: KEEPALIVE_CHANNEL_ID
        sync: false
      - key: LAVALINK_HOST
        sync: false
      - key: LAVALINK_PORT
        value: "2333"
      - key: LAVALINK_PASSWORD
        sync: false
      - key: LAVALINK_SECURE
        value: "false"

  # ── Dashboard (Web — React SPA + Express API + OAuth2) ────────────────────
  - type: web
    name: discord-dashboard
    runtime: node
    plan: starter
    buildCommand: pnpm install --no-lockfile --include=dev && pnpm build:ui
    startCommand: node src/index.server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  # ── Lavalink (Docker — tùy chọn, cần cho music commands) ─────────────────
  - type: web
    name: lavalink
    runtime: docker
    plan: free
    dockerfilePath: ./lavalink/Dockerfile
    dockerContext: ./lavalink
    healthCheckPath: /version
    envVars:
      - key: LAVALINK_PASSWORD
        sync: false