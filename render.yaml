services:
  - type: web
    name: discord-service-bot
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: node src/index.js
    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CONFIG_PATH
        value: /var/data/configs.json
      - key: STATE_PATH
        value: /var/data/state.json
      - key: DAILY_RESET_UTC_OFFSET_MINUTES
        value: 420
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: RIOT_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
    healthCheckPath: /health
